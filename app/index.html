<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <base href="/mouse/" />
  <title>BLE Mouse Controller</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #0f3460;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }

    #status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #888;
    }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    #status-dot.connected  { background: #4ade80; }
    #status-dot.connecting { background: #facc15; animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    main {
      flex: 1;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    /* --- Tabs --- */
    .tabs {
      display: flex;
      border-bottom: 1px solid #0f3460;
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      color: #666;
      padding: 0.5rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: color 0.2s, border-color 0.2s;
      border-radius: 0;
    }
    .tab-btn:active { transform: none; }
    .tab-btn.active { color: #e0e0e0; border-bottom-color: #3b82f6; }

    .tab-panel { display: flex; flex-direction: column; gap: 1.25rem; }
    .tab-panel.hidden { display: none; }

    /* --- Cards --- */
    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 1rem;
    }

    .card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 0.85rem;
    }

    .btn-grid {
      display: grid;
      gap: 0.6rem;
    }
    .btn-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .btn-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    button {
      padding: 0.7rem 0.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-primary   { background: #0f3460; color: #e0e0e0; }
    .btn-green     { background: #166534; color: #bbf7d0; }
    .btn-red       { background: #7f1d1d; color: #fecaca; }
    .btn-yellow    { background: #713f12; color: #fef08a; }
    .btn-blue      { background: #1e3a5f; color: #bfdbfe; }
    .btn-connect   { background: #0f3460; color: #e0e0e0; min-width: 110px; }
    .btn-connect.connected { background: #7f1d1d; color: #fecaca; }
    .btn-send      { background: #0f3460; color: #e0e0e0; white-space: nowrap; }

    .btn-eye {
      background: transparent;
      border: 1px solid #1e4480;
      border-radius: 6px;
      color: #888;
      padding: 0.45rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-eye:hover  { color: #e0e0e0; border-color: #3b82f6; }
    .btn-eye:active { transform: scale(0.96); }
    .btn-eye svg    { width: 1.1rem; height: 1.1rem; display: block; }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .input-row label {
      font-size: 0.8rem;
      color: #aaa;
      white-space: nowrap;
      min-width: 1.5rem;
    }

    .field-label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.5rem;
    }

    input[type="number"], input[type="text"], input[type="password"] {
      flex: 1;
      background: #0f3460;
      border: 1px solid #1e4480;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 0.55rem 0.6rem;
      font-size: 0.9rem;
      outline: none;
      min-width: 0;
    }
    input[type="number"]:focus, input[type="text"]:focus, input[type="password"]:focus {
      border-color: #3b82f6;
    }

    #log {
      background: #0d1117;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-family: monospace;
      font-size: 0.75rem;
      color: #4ade80;
      height: 80px;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
    }
  </style>
</head>
<body>

<header>
  <h1>BLE Mouse Controller</h1>
  <div id="status">
    <span id="status-dot"></span>
    <span id="status-text">Disconnected</span>
  </div>
  <button class="btn-connect" id="btn-connect">Connect</button>
  <button id="btn-install" hidden
    style="background:#1e4d2b;color:#bbf7d0;border:none;border-radius:8px;padding:0.45rem 0.75rem;font-size:0.8rem;font-weight:600;cursor:pointer;">
    ⬇ Install
  </button>
</header>

<main>

  <!-- Tab navigation -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="controls">Controls</button>
    <button class="tab-btn"        data-tab="cipher">Cipher</button>
    <button class="tab-btn"        data-tab="settings" style="margin-left:auto;" aria-label="Settings" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1.1rem;height:1.1rem;display:block;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
  </div>

  <!-- Controls panel -->
  <div id="panel-controls" class="tab-panel">

    <!-- Auto-movement -->
    <div class="card">
      <h2>Auto-movement</h2>
      <div class="btn-grid cols-3">
        <button class="btn-green"  data-cmd="START"  disabled>Start</button>
        <button class="btn-red"    data-cmd="STOP"   disabled>Stop</button>
        <button class="btn-yellow" data-cmd="TOGGLE" disabled>Toggle</button>
      </div>
    </div>

    <!-- Move -->
    <div class="card">
      <h2>Move</h2>
      <div style="display:flex;flex-direction:column;gap:0.5rem;">
        <div class="input-row">
          <label>X</label>
          <input type="number" id="move-x" value="50" min="-127" max="127" />
          <label>Y</label>
          <input type="number" id="move-y" value="0" min="-127" max="127" />
          <button class="btn-blue" id="btn-move" disabled>Move</button>
        </div>
        <div class="btn-grid cols-3" style="margin-top:0.25rem;">
          <button class="btn-primary" data-move="0,-50"  disabled>▲</button>
          <button class="btn-primary" data-move="-50,0"  disabled>◀</button>
          <button class="btn-primary" data-move="50,0"   disabled>▶</button>
        </div>
        <div style="display:flex;justify-content:center;">
          <button class="btn-primary" data-move="0,50" style="width:33%" disabled>▼</button>
        </div>
      </div>
    </div>

    <!-- Click -->
    <div class="card">
      <h2>Click</h2>
      <div class="btn-grid cols-3">
        <button class="btn-blue" data-cmd="CLICK LEFT"   disabled>Left</button>
        <button class="btn-blue" data-cmd="CLICK MIDDLE" disabled>Middle</button>
        <button class="btn-blue" data-cmd="CLICK RIGHT"  disabled>Right</button>
      </div>
    </div>

    <!-- Scroll -->
    <div class="card">
      <h2>Scroll</h2>
      <div class="input-row">
        <input type="number" id="scroll-amount" value="3" min="-127" max="127" />
        <button class="btn-blue" id="btn-scroll-up"   disabled>▲ Up</button>
        <button class="btn-blue" id="btn-scroll-down" disabled>▼ Down</button>
      </div>
    </div>

    <!-- Type text -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;">
        <h2 style="margin-bottom:0;">Type Text</h2>
        <button class="btn-blue" id="btn-enter" disabled style="padding:0.25rem 0.6rem;font-size:0.75rem;">↵ Enter</button>
      </div>
      <div class="input-row">
        <input type="text" id="type-text" placeholder="text to type on the PC…" />
        <button class="btn-send" id="btn-type" disabled>Type</button>
      </div>
    </div>

    <!-- Custom command -->
    <div class="card">
      <h2>Custom Command</h2>
      <div class="input-row">
        <input type="text" id="custom-cmd" placeholder="e.g. MOVE 100 -50" />
        <button class="btn-send" id="btn-custom" disabled>Send</button>
      </div>
    </div>

  </div><!-- /panel-controls -->

  <!-- Cipher panel -->
  <div id="panel-cipher" class="tab-panel hidden">

    <!-- Password Deriver -->
    <div class="card">
      <h2>Password Deriver</h2>
      <label class="field-label" for="deriver-input">Context and version (e.g. <code style="color:#93c5fd">gmail.com 1</code>)</label>
      <div class="input-row">
        <input type="text" id="deriver-input" placeholder="gmail.com 1" autocomplete="off" />
        <button class="btn-send" id="btn-derive">Derive</button>
      </div>
      <p id="deriver-msg" style="font-size:0.75rem;color:#4ade80;margin-top:0.5rem;visibility:hidden;">Done.</p>
    </div>

    <!-- Send cipher text -->
    <div class="card">
      <h2>Cipher Text</h2>
      <label class="field-label" for="cipher-text">Secret text</label>
      <div class="input-row">
        <input type="password" id="cipher-text" placeholder="text to encrypt and type…" autocomplete="off" />
        <button class="btn-eye" id="btn-eye-cipher" aria-label="Show / hide text" title="Show / hide"></button>
        <button class="btn-send" id="btn-copy-cipher">Copy</button>
        <button class="btn-send" id="btn-cipher" disabled>Send</button>
      </div>
    </div>

  </div><!-- /panel-cipher -->

  <!-- Settings panel -->
  <div id="panel-settings" class="tab-panel hidden">

    <!-- Pre-shared key -->
    <div class="card">
      <h2>Pre-shared Key</h2>
      <label class="field-label" for="cipher-key">Password (must match device's secret.txt)</label>
      <div class="input-row">
        <input type="password" id="cipher-key" placeholder="enter shared password…" autocomplete="new-password" />
        <button class="btn-eye" id="btn-eye-key" aria-label="Show / hide key" title="Show / hide"></button>
      </div>
    </div>

    <!-- Worker URL -->
    <div class="card">
      <h2>Password Deriver</h2>
      <label class="field-label" for="deriver-url">Worker URL</label>
      <input type="text" id="deriver-url" placeholder="https://password-deriver.<account>.workers.dev" autocomplete="off" style="width:100%;" />
    </div>

    <!-- Keyboard Layout -->
    <div class="card">
      <h2>Keyboard Layout</h2>
      <select id="keyboard-layout" style="width:100%;background:#0f3460;border:1px solid #1e4480;border-radius:6px;color:#e0e0e0;padding:0.55rem 0.6rem;font-size:0.9rem;outline:none;">
        <option value="EN">English (US)</option>
        <option value="IT">Italian</option>
      </select>
    </div>

    <button class="btn-send" id="btn-save-settings" style="width:100%;padding:0.75rem;">Save</button>
    <p id="settings-saved-msg" style="font-size:0.75rem;color:#4ade80;text-align:center;margin-top:-0.5rem;visibility:hidden;">Saved to browser storage.</p>

  </div><!-- /panel-settings -->

  <!-- Log (always visible) -->
  <div id="log"><span style="color:#555">— ready —</span></div>

</main>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>
</body>
</html>
